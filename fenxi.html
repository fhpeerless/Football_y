<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球预测概率查看器（Web JSON数据1）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a237e 0%, #311b92 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00bcd4, #8e24aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        
        .control-panel {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .results-panel {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: auto;
            max-height: 70vh;
        }
        
        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #00bcd4;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.6rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #bbdefb;
        }
        
        input, select, button {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00bcd4;
            box-shadow: 0 0 0 2px rgba(0, 188, 212, 0.2);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        button {
            background: linear-gradient(135deg, #00bcd4 0%, #00838f 100%);
            border: none;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 188, 212, 0.3);
        }
        
        button.secondary {
            background: linear-gradient(135deg, #8e24aa 0%, #6a1b9a 100%);
        }
        
        button.secondary:hover {
            box-shadow: 0 8px 20px rgba(142, 36, 170, 0.3);
        }
        
        .match-buttons {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .match-btn {
            padding: 8px 12px;
            font-size: 0.9em;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }
        
        .match-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            border-left: 4px solid #f44336;
            display: block;
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.2);
            border-left: 4px solid #2196f3;
            display: block;
        }
        

        
        .result-3 {
            color: #4caf50;
            font-weight: bold;
        }
        
        .result-1 {
            color: #ff9800;
            font-weight: bold;
        }
        
        .result-0 {
            color: #f44336;
            font-weight: bold;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bcd4, #8e24aa);
            width: 0%;
            transition: width 0.5s;
        }
        
        .download-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.3);
        }
        
        .file-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        

        
        .file-input-group button {
            width: auto;
            padding: 12px 20px;
        }
        
        /* 期数选择标签 */
        .bqc-period-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }
        .bqc-period-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .bqc-period-btn:hover {
            background: rgba(0, 188, 212, 0.2);
            border-color: rgba(0, 188, 212, 0.4);
            color: #fff;
            transform: translateY(-1px);
        }
        .bqc-period-btn.active {
            background: linear-gradient(135deg, #00bcd4 0%, #00838f 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
        }
        
        /* ========== Tab 导航样式 ========== */
        .tab-nav {
            display: flex;
            gap: 0;
            margin: 0 auto 25px;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #00bcd4 0%, #00838f 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* ========== SPF 数据页面样式 ========== */
        .spf-panel {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 30px;
        }
        
        .spf-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        
        .spf-table th, .spf-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .spf-table th {
            background: rgba(0, 188, 212, 0.15);
            color: #00bcd4;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        .spf-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .spf-table .team-cell {
            font-weight: 600;
        }
        
        .spf-table .odds-up {
            color: #f44336;
        }
        
        .spf-table .odds-down {
            color: #4caf50;
        }
        
        .spf-match-card {
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .spf-match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .opponent-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .opponent-tag.has-data {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .opponent-tag.no-data {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        /* SPF 预测按钮 - 点击选中效果 */
        .spf-predict-section {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 0;
        }
        .spf-predict-btn {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s ease;
            user-select: none;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-align: center;
            min-width: 52px;
        }
        .spf-predict-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }
        .spf-predict-btn.selected-win {
            background: rgba(76, 175, 80, 0.35);
            border-color: #4caf50;
            color: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        .spf-predict-btn.selected-draw {
            background: rgba(255, 193, 7, 0.35);
            border-color: #ffc107;
            color: #ffc107;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
        }
        .spf-predict-btn.selected-lose {
            background: rgba(244, 67, 54, 0.35);
            border-color: #f44336;
            color: #f44336;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }

        /* 半全场赔率单元格 - 仅展示，不可点选 */
        .bqc-odds-cell {
            transition: all 0.2s ease;
        }

        /* 半全场 3/1/0 选择器按钮 */
        .bqc-half-predict {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .bqc-half-btn {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s ease;
            user-select: none;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-align: center;
            min-width: 52px;
        }
        .bqc-half-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }
        .bqc-half-btn.selected-win {
            background: rgba(76, 175, 80, 0.35);
            border-color: #4caf50;
            color: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        .bqc-half-btn.selected-draw {
            background: rgba(255, 193, 7, 0.35);
            border-color: #ffc107;
            color: #ffc107;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
        }
        .bqc-half-btn.selected-lose {
            background: rgba(244, 67, 54, 0.35);
            border-color: #f44336;
            color: #f44336;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }

        /* 期数切换按钮 */
        .period-btn {
            padding: 6px 14px;
            border: 1px solid rgba(0, 188, 212, 0.3);
            background: transparent;
            color: #ccc;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }
        .period-btn:hover {
            border-color: #00bcd4;
            color: #00bcd4;
        }
        .period-btn.active {
            background: rgba(0, 188, 212, 0.2);
            color: #00bcd4;
            border-color: #00bcd4;
            box-shadow: 0 0 8px rgba(0, 188, 212, 0.3);
        }

        /* ========== 移动端独立样式 ========== */
        @media (max-width: 768px) {
            /* 整体缩小 */
            body {
                padding: 8px;
            }
            .container {
                padding: 12px;
                border-radius: 12px;
            }
            header {
                margin-bottom: 12px;
                padding-bottom: 10px;
            }
            header h1 {
                font-size: 1.3rem;
            }
            header .subtitle {
                font-size: 0.75rem;
            }

            /* Tab 导航浮动在视口最下面 */
            .tab-nav {
                position: fixed;
                bottom: 12px;
                left: 10px;
                right: 10px;
                z-index: 1000;
                margin-bottom: 0;
                border-radius: 14px;
                border: 1px solid rgba(255,255,255,0.15);
                background: rgba(26, 35, 78, 0.95);
                backdrop-filter: blur(12px);
                padding: 5px 6px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            }
            .tab-btn {
                font-size: 0.75rem;
                padding: 8px 6px;
                border-radius: 6px;
                gap: 4px;
            }
            .tab-btn i {
                font-size: 0.85rem;
            }
            /* 内容区域底部留白，避免被固定tab遮挡 */
            .tab-content {
                padding-bottom: 56px;
            }

            /* 通用缩放 */
            .section-title {
                font-size: 1rem;
                margin-bottom: 10px;
            }
            .section-title i {
                font-size: 1.1rem;
            }
            .spf-panel {
                padding: 12px;
                border-radius: 10px;
            }
            .control-panel,
            .results-panel {
                padding: 12px;
                border-radius: 10px;
            }
            .results-panel {
                max-height: none;
            }
            .btn-group {
                flex-wrap: wrap;
                gap: 6px;
                margin-top: 10px;
            }
            .btn-group button {
                flex: 1 1 auto;
                min-width: 0;
                font-size: 0.78rem;
                padding: 8px 10px;
            }
            input, select, button {
                font-size: 0.85rem;
                padding: 8px 10px;
            }
            .form-group {
                margin-bottom: 10px;
            }
            label {
                font-size: 0.85rem;
                margin-bottom: 4px;
            }

            /* 14场 - 快速跳转按钮 */
            .match-buttons {
                gap: 4px;
            }
            .match-btn {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-width: 0;
            }

            /* SPF 比赛卡片 */
            .spf-match-card {
                padding: 10px;
                margin-bottom: 10px;
            }
            .spf-match-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                margin-bottom: 8px;
                padding-bottom: 8px;
            }
            .spf-match-header h4 {
                font-size: 0.85rem !important;
            }
            .spf-match-header > div:last-child {
                flex-wrap: wrap;
                gap: 6px;
                width: 100%;
            }
            .spf-match-header > div:last-child > span:first-child {
                font-size: 0.8rem !important;
            }
            .opponent-tag {
                font-size: 0.75rem;
                padding: 2px 8px;
            }

            /* SPF 预测按钮 */
            .spf-predict-section {
                gap: 4px;
                padding: 4px 0;
                margin-bottom: 6px;
            }
            .spf-predict-btn {
                font-size: 0.78rem;
                padding: 4px 12px;
                min-width: 40px;
            }

            /* SPF 表格 (共同对手详情) */
            .spf-table {
                font-size: 0.65em;
            }
            .spf-table th, .spf-table td {
                padding: 3px 3px;
            }
            details {
                font-size: 0.8rem;
            }
            details summary {
                font-size: 0.82rem;
            }
            details table {
                font-size: 0.7rem;
            }
            details table th,
            details table td {
                padding: 2px 3px !important;
            }

            /* 半全场赔率表 */
            .bqc-odds-cell {
                font-size: 0.85em;
            }
            .bqc-odds-cell td {
                padding: 4px 3px !important;
            }

            /* 进度条 */
            .progress-bar {
                height: 6px;
                margin: 8px 0;
            }

            /* 状态消息 */
            .status {
                font-size: 0.8rem;
                padding: 6px 10px;
            }

            /* 通用文本 */
            p {
                font-size: 0.82rem !important;
            }

            /* 下载链接 */
            .download-link {
                font-size: 0.85rem;
                padding: 8px 12px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-futbol"></i> 足球预测概率合并工具</h1>
            <p class="subtitle">查看已生成的预测概率合并结果（web.json数据）</p>
        </header>
        </div>  <!-- end .container -->
        
        <!-- 顶级分类导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="spf"><i class="fas fa-chart-bar"></i> 胜平负数据</button>
            <button class="tab-btn" data-tab="f14"><i class="fas fa-futbol"></i> 14场分析</button>
            <button class="tab-btn" data-tab="bqc"><i class="fas fa-chart-pie"></i> 半全场数据</button>
        </div>
        
        <div class="container">
        <!-- SPF 数据页面 -->
        <div id="tab-spf" class="tab-content active">
            <div class="spf-panel">
                <h2 class="section-title"><i class="fas fa-handshake"></i> 共同对手分析</h2>
                
                <div class="form-group">
                    <div class="btn-group" style="margin-top: 0;">
                        <button id="loadCommonMatchBtn">
                            <i class="fas fa-sync-alt"></i> 加载共同对手数据
                        </button>
                    </div>
                    <p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">
                        加载 spf/data/common_match.json 中的共同对手分析数据
                    </p>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="spfProgressFill"></div>
                </div>
                
                <div class="status" id="spfStatusMessage">
                </div>
            </div>
            
            <!-- 共同对手分析结果 -->
            <div id="spfCommonSection" style="display: none;">
                <div class="spf-panel">
                    <h2 class="section-title"><i class="fas fa-list-alt"></i> 共同对手分析结果</h2>
                    <div id="spfCommonBody"></div>
                </div>
            </div>
        </div>
        
        <!-- 14场分析页面（原内容） -->
        <div id="tab-f14" class="tab-content">
        <div class="main-content">
            <div class="control-panel">
                <h2 class="section-title"><i class="fas fa-sliders-h"></i> 控制面板</h2>
                
                <div class="form-group">
                    <label><i class="fas fa-list-ol"></i> 快速跳转</label>
                    <div class="match-buttons">
                        <button class="match-btn" data-match="1">第1场</button>
                        <button class="match-btn" data-match="2">第2场</button>
                        <button class="match-btn" data-match="3">第3场</button>
                        <button class="match-btn" data-match="4">第4场</button>
                        <button class="match-btn" data-match="5">第5场</button>
                        <button class="match-btn" data-match="6">第6场</button>
                        <button class="match-btn" data-match="7">第7场</button>
                        <button class="match-btn" data-match="8">第8场</button>
                        <button class="match-btn" data-match="9">第9场</button>
                        <button class="match-btn" data-match="10">第10场</button>
                        <button class="match-btn" data-match="11">第11场</button>
                        <button class="match-btn" data-match="12">第12场</button>
                        <button class="match-btn" data-match="13">第13场</button>
                        <button class="match-btn" data-match="14">第14场</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="periodInput"><i class="fas fa-calendar-alt"></i> 当前期数</label>
                    <div class="file-input-group">
                        <input type="text" id="periodInput" placeholder="正在获取最新期数..." value="">
                        <button id="fetchPeriodBtn" class="secondary">
                            <i class="fas fa-sync-alt"></i> 获取期数
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-database"></i> 数据文件</label>
                    <div class="btn-group" style="margin-top: 10px;">
                        <button id="loadWebDataBtn">
                            <i class="fas fa-file-import"></i> 加载Web数据
                        </button>
                        <button id="downloadBtn" class="secondary">
                            <i class="fas fa-download"></i> 号码结果
                        </button>
                        <button id="commonMatchesBtn" class="secondary">
                            <i class="fas fa-handshake"></i> 共同对手
                        </button>
                    </div>
                    <p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">
                        将自动加载 ./14chang/result/{期数}期_web.json 文件
                    </p>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="status" id="statusMessage">
                    <!-- 状态消息将显示在这里 -->
                </div>
            </div>
            
            <div class="results-panel">
                <h2 class="section-title"><i class="fas fa-list-alt"></i> 计算结果</h2>
                
                <div id="resultsContainer">
                    <p style="text-align: center; opacity: 0.7; padding: 40px;">
                        请先获取期数，然后点击"加载Web数据"按钮查看预测结果
                    </p>
                </div>
                
                <a href="#" id="downloadLink" class="download-link" style="display: none;">
                    <i class="fas fa-file-download"></i> 下载合并结果 (JSON)
                </a>
            </div>
        </div>
    </div>  <!-- end #tab-f14 -->
    
    <!-- 半全场数据页面 -->
    <div id="tab-bqc" class="tab-content">
        <div class="spf-panel">
            <h2 class="section-title"><i class="fas fa-handshake"></i> 半全场共同对手分析</h2>
            
            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> 选择期数</label>
                <div class="bqc-period-tabs" id="bqcPeriodTabs">
                    <div style="opacity: 0.7; padding: 5px 0; font-size: 0.9em;">正在获取期数列表...</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="bqcProgressFill"></div>
            </div>
            
            <div class="status" id="bqcStatusMessage">
            </div>
        </div>
        
        <!-- 半全场分析结果 -->
        <div id="bqcCommonSection" style="display: none;">
            <div class="spf-panel">
                <h2 class="section-title"><i class="fas fa-list-alt"></i> 半全场分析结果</h2>
                <div id="bqcCommonBody"></div>
            </div>
        </div>
    </div>
</div>  <!-- end .container -->

    <script>
        // 全局变量
        let currentPeriod = '';
        let webData = null;
        let bqcAllData = null;
        let bqcCurrentPeriod = '';
        
        // DOM元素
        const periodInput = document.getElementById('periodInput');
        const fetchPeriodBtn = document.getElementById('fetchPeriodBtn');
        const loadWebDataBtn = document.getElementById('loadWebDataBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadLink = document.getElementById('downloadLink');
        const statusMessage = document.getElementById('statusMessage');
        const progressFill = document.getElementById('progressFill');
        const resultsContainer = document.getElementById('resultsContainer');
        
        // 显示状态消息
        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status ${type}`;
            setTimeout(() => {
                statusMessage.className = 'status';
            }, type === 'error' ? 5000 : 3000);
        }
        
        // 更新进度条
        function updateProgress(percent) {
            progressFill.style.width = `${percent}%`;
        }
        
        // 获取当前期数
        async function fetchCurrentPeriod() {
            try {
                showStatus('正在从present.json获取当前期数...', 'info');
                updateProgress(30);
                
                try {
                    // 添加时间戳防止缓存
                    const timestamp = Date.now();
                    const url = `./14chang/present.json?t=${timestamp}`;
                    console.log(`正在请求: ${url}`);
                    
                    const response = await fetch(url);
                    console.log(`响应状态: ${response.status} ${response.statusText}`);
                    console.log(`响应 URL: ${response.url}`);
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log('获取到的数据:', data);
                        
                        // 验证数据格式
                        if (Array.isArray(data) && data.length > 0) {
                            // 获取最后一个条目的期数（最新期数）
                            const lastEntry = data[data.length - 1];
                            console.log('最后一条记录:', lastEntry);
                            
                            const period = lastEntry.period || lastEntry.period_number?.toString() || '';
                            
                            if (period) {
                                currentPeriod = period.toString();
                                periodInput.value = currentPeriod;
                                updateProgress(100);
                                showStatus(`成功获取当前期数: ${currentPeriod}期`, 'success');
                                console.log(`从present.json获取到最新期数: ${period}`);
                                
                                // 获取期数后自动加载web.json数据
                                setTimeout(() => {
                                    loadWebDataBtn.click();
                                }, 500);
                                
                                return currentPeriod;
                            }
                        } else {
                            console.error('数据格式错误: 不是数组或数组为空');
                        }
                    } else {
                        console.error(`HTTP 错误: ${response.status} ${response.statusText}`);
                    }
                    
                    // 获取失败，提示用户手动输入
                    console.log('无法从present.json获取期数');
                    periodInput.placeholder = '请手动输入期数';
                    updateProgress(0);
                    showStatus('无法获取期数，请手动输入', 'error');
                    return null;
                    
                } catch (fileError) {
                    console.error('读取present.json文件失败:', fileError);
                    console.error('错误堆栈:', fileError.stack);
                    periodInput.placeholder = '请手动输入期数';
                    updateProgress(0);
                    showStatus(`读取期数文件失败: ${fileError.message}`, 'error');
                    return null;
                }
            } catch (error) {
                console.error('获取期数错误:', error);
                periodInput.placeholder = '请手动输入期数';
                updateProgress(0);
                showStatus(`获取期数失败: ${error.message}，请手动输入`, 'error');
                return null;
            }
        }
        

        
        // 加载Web JSON数据
        async function loadWebData(isRetry = false) {
            // 从输入框读取当前期数
            const inputPeriod = periodInput.value.trim();
            if (inputPeriod) {
                // 提取数字部分（例如从"26027期"中提取"26027"）
                const periodMatch = inputPeriod.match(/\d+/);
                if (periodMatch) {
                    currentPeriod = periodMatch[0];
                } else {
                    currentPeriod = inputPeriod;
                }
            }
            
            if (!currentPeriod) {
                showStatus('请先获取或输入期数', 'error');
                return null;
            }
            
            // 尝试加载，如果404则自动回退到前一期
            const maxRetries = 10;
            let tryPeriod = currentPeriod;
            
            for (let attempt = 0; attempt < maxRetries; attempt++) {
                try {
                    const displayInfo = attempt > 0 ? `(回退尝试: 第${tryPeriod}期)` : '';
                    showStatus(`正在加载 ${tryPeriod}期_web.json 文件... ${displayInfo}`, 'info');
                    updateProgress(40);
                    
                    const timestamp = Date.now();
                    const fileUrl = `./14chang/result/${tryPeriod}期_web.json?t=${timestamp}`;
                    console.log(`正在加载: ${fileUrl}`);
                    
                    const response = await fetch(fileUrl);
                    
                    if (!response.ok) {
                        if (response.status === 404) {
                            // 文件不存在，回退到前一期
                            console.log(`${tryPeriod}期_web.json 不存在，尝试回退到前一期`);
                            const prevPeriod = (parseInt(tryPeriod) - 1).toString();
                            if (prevPeriod !== tryPeriod) {
                                tryPeriod = prevPeriod;
                                continue;
                            }
                            throw new Error(`文件不存在: ${fileUrl}`);
                        } else {
                            throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                        }
                    }
                    
                    const data = await response.json();
                    updateProgress(80);
                    
                    // 验证数据格式
                    if (!data.期数 || !data.计算结果 || !Array.isArray(data.计算结果)) {
                        throw new Error('web.json文件格式不正确');
                    }
                    
                    webData = data;
                    
                    // 如果使用了回退期数，更新UI显示
                    if (tryPeriod !== currentPeriod) {
                        currentPeriod = tryPeriod;
                        periodInput.value = tryPeriod;
                        showStatus(`未找到${inputPeriod}期数据，已自动回退到 ${tryPeriod}期`, 'info');
                    }
                    
                    updateProgress(100);
                    showStatus(`成功加载 ${data.计算结果.length} 场比赛数据`, 'success');
                    
                    // 显示结果
                    displayResults();
                    
                    // 生成下载链接
                    generateDownloadLink();
                    
                    return webData;
                } catch (error) {
                    console.error(`加载 ${tryPeriod}期_web.json 错误:`, error);
                    
                    // 如果是404且还有重试次数，继续尝试前一期
                    if (error.message.includes('文件不存在') && attempt < maxRetries - 1) {
                        const prevPeriod = (parseInt(tryPeriod) - 1).toString();
                        if (prevPeriod !== tryPeriod) {
                            tryPeriod = prevPeriod;
                            continue;
                        }
                    }
                    
                    updateProgress(0);
                    showStatus(`加载失败: ${error.message}`, 'error');
                    
                    if (error.message.includes('文件不存在')) {
                        showStatus(`未找到可用数据文件，请先运行 pipeline`, 'error');
                    }
                    
                    return null;
                }
            }
            
            updateProgress(0);
            showStatus('加载失败: 未找到任何可用的期数数据', 'error');
            return null;
        }
        

        

        
        // 显示计算结果
        function displayResults() {
            if (!webData || !webData.计算结果 || webData.计算结果.length === 0) {
                resultsContainer.innerHTML = `
                    <p style="text-align: center; opacity: 0.7; padding: 40px;">
                        暂无数据，请先加载Web JSON数据
                    </p>
                `;
                return;
            }
            
            let html = `
                <div style="margin-bottom: 30px; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; border-left: 4px solid #00bcd4;">
                    <h3 style="color: #00bcd4; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-info-circle"></i> 数据信息
                    </h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">
                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">期数</p>
                            <p style="font-size: 1.2em; font-weight: 600;">${webData.期数 || '未知'}</p>
                        </div>

                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">生成时间</p>
                            <p>${webData.生成时间 ? new Date(webData.生成时间).toLocaleString() : '未知'}</p>
                        </div>

                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">数据来源</p>
                            <p style="word-break: break-all;">${webData.数据来源 ? `${webData.数据来源.基础预测文件}<br>${webData.数据来源.高级预测文件}` : 'web.json文件'}</p>
                        </div>
                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">加权规则</p>
                            <p>${webData.加权规则 || '基础预测概率 + 高级预测概率'}</p>
                        </div>
                    </div>
                </div>
                
                <div style="margin-bottom: 30px;">
                    <h3 style="color: #00bcd4; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-futbol"></i> 比赛预测详情 (${webData.计算结果.length} 场)
                    </h3>
            `;
            
            // 显示每场比赛的详细卡片
            webData.计算结果.forEach((match, index) => {
                const winPercent = (match.合并概率.胜 * 100).toFixed(1);
                const drawPercent = (match.合并概率.平 * 100).toFixed(1);
                const losePercent = (match.合并概率.负 * 100).toFixed(1);
                const basicWinPercent = (match.基础预测概率.胜 * 100).toFixed(1);
                const basicDrawPercent = (match.基础预测概率.平 * 100).toFixed(1);
                const basicLosePercent = (match.基础预测概率.负 * 100).toFixed(1);
                const advancedWinPercent = (match.高级预测概率.胜 * 100).toFixed(1);
                const advancedDrawPercent = (match.高级预测概率.平 * 100).toFixed(1);
                const advancedLosePercent = (match.高级预测概率.负 * 100).toFixed(1);
                
                const resultClass = `result-${match.预测结果}`;
                const resultText = match.预测结果 === 3 ? '主胜(3)' : match.预测结果 === 1 ? '平(1)' : '客胜(0)';
                const resultColor = match.预测结果 === 3 ? '#4caf50' : match.预测结果 === 1 ? '#ff9800' : '#f44336';
                
                // 共同对手实力分（直接使用新格式字段）
                const st = match.共同对手实力分;
                const homeTotalScore = st.主队总实力分;
                const awayTotalScore = st.客队总实力分;
                const homeRatio = st.主队相对实力比;
                const awayRatio = st.客队相对实力比;
                
                html += `
                    <div style="margin-bottom: 30px; padding: 25px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);" id="match-${match.场次}">
                        <!-- 比赛基本信息 -->
                        <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <div>
                                    <h4 style="color: #00bcd4; margin-bottom: 5px;">
                                        <a href="./14chang/list.html#match-${match.场次}" style="color: inherit; text-decoration: none;">
                                            第 ${match.场次} 场 · ${match.联赛}
                                        </a>
                                    </h4>
                                    <p style="opacity: 0.8; font-size: 0.9em;">
                                        <i class="far fa-clock"></i> ${match.比赛时间}
                                    </p>
                                </div>
                                <div style="background: ${resultColor}20; padding: 8px 16px; border-radius: 20px; border: 1px solid ${resultColor}40;">
                                    <span class="${resultClass}" style="font-weight: 600; font-size: 1.1em;">${resultText}</span>
                                </div>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 8px;">
                                <div style="text-align: center; flex: 1;">
                                    <p style="font-size: 1.5em; font-weight: 600; color: #00bcd4;">${match.主队}</p>
                                    <p style="opacity: 0.8; font-size: 0.9em;">主队</p>
                                </div>
                                <div style="text-align: center; margin: 0 20px;">
                                    <p style="font-size: 1.2em; opacity: 0.7;">VS</p>
                                </div>
                                <div style="text-align: center; flex: 1;">
                                    <p style="font-size: 1.5em; font-weight: 600; color: #ff9800;">${match.客队}</p>
                                    <p style="opacity: 0.8; font-size: 0.9em;">客队</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 共同对手实力分部分 -->
                        ${match.共同对手实力分 ? `
                        <div style="margin-top: 30px; padding-top: 25px; border-top: 2px solid rgba(255, 255, 255, 0.1);">
                            <h5 style="color: #bbdefb; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                                <i class="fas fa-handshake"></i> 共同对手实力分
                            </h5>
                            
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                                <!-- 总实力分 -->
                                <div style="padding: 15px; background: rgba(255, 193, 7, 0.05); border-radius: 8px; border-left: 3px solid #ffc107;">
                                    <h6 style="color: #ffc107; margin-bottom: 10px; font-size: 0.95em;">
                                        <i class="fas fa-star"></i> 总实力分
                                    </h6>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>主队总实力分:</span>
                                        <span style="font-weight: 600;">${homeTotalScore.toFixed(3)}</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>客队总实力分:</span>
                                        <span style="font-weight: 600;">${awayTotalScore.toFixed(3)}</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between;">
                                        <span>共同对手数:</span>
                                        <span style="font-weight: 600;">${match.共同对手实力分.共同对手数}</span>
                                    </div>
                                </div>
                                
                                <!-- 相对实力比 -->
                                <div style="padding: 15px; background: rgba(156, 39, 176, 0.05); border-radius: 8px; border-left: 3px solid #9c27b0;">
                                    <h6 style="color: #9c27b0; margin-bottom: 10px; font-size: 0.95em;">
                                        <i class="fas fa-balance-scale-left"></i> 相对实力比
                                    </h6>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>主队相对实力比:</span>
                                        <span style="font-weight: 600;">${(homeRatio * 100).toFixed(1)}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>客队相对实力比:</span>
                                        <span style="font-weight: 600;">${(awayRatio * 100).toFixed(1)}%</span>
                                    </div>
                                    <div style="margin-top: 15px;">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                            <span style="font-size: 0.9em; opacity: 0.8;">实力对比:</span>
                                        </div>
                                        <div style="height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden;">
                                            <div style="height: 100%; width: ${homeRatio * 100}%; background: linear-gradient(90deg, #ffc107, #ff9800); border-radius: 4px 0 0 4px;"></div>
                                        </div>
                                        <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                                            <span style="font-size: 0.85em; opacity: 0.8;">主队</span>
                                            <span style="font-size: 0.85em; opacity: 0.8;">客队</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <!-- 概率数据部分 -->
                        <div style="margin-bottom: 25px;">
                            <h5 style="color: #bbdefb; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                                <i class="fas fa-chart-pie"></i> 概率分析
                            </h5>
                            
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                                <!-- 基础预测概率 -->
                                <div style="padding: 15px; background: rgba(0, 188, 212, 0.05); border-radius: 8px; border-left: 3px solid #00bcd4;">
                                    <h6 style="color: #00bcd4; margin-bottom: 10px; font-size: 0.95em;">
                                        <i class="fas fa-calculator"></i> 基础预测概率（Elo+泊松）
                                    </h6>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>主胜:</span>
                                        <span style="font-weight: 600;">${basicWinPercent}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>平:</span>
                                        <span style="font-weight: 600;">${basicDrawPercent}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between;">
                                        <span>客胜:</span>
                                        <span style="font-weight: 600;">${basicLosePercent}%</span>
                                    </div>
                                </div>
                                
                                <!-- 高级预测概率 -->
                                <div style="padding: 15px; background: rgba(142, 36, 170, 0.05); border-radius: 8px; border-left: 3px solid #8e24aa;">
                                    <h6 style="color: #8e24aa; margin-bottom: 10px; font-size: 0.95em;">
                                        <i class="fas fa-chart-line"></i> 高级预测概率
                                    </h6>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>主胜:</span>
                                        <span style="font-weight: 600;">${advancedWinPercent}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>平:</span>
                                        <span style="font-weight: 600;">${advancedDrawPercent}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between;">
                                        <span>客胜:</span>
                                        <span style="font-weight: 600;">${advancedLosePercent}%</span>
                                    </div>
                                </div>
                                
                                <!-- 合并概率 -->
                                <div style="padding: 15px; background: rgba(76, 175, 80, 0.05); border-radius: 8px; border-left: 3px solid #4caf50;">
                                    <h6 style="color: #4caf50; margin-bottom: 10px; font-size: 0.95em;">
                                        <i class="fas fa-balance-scale"></i> 合并概率
                                    </h6>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>主胜:</span>
                                        <span style="font-weight: 600; font-size: 1.1em;">${winPercent}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span>平:</span>
                                        <span style="font-weight: 600; font-size: 1.1em;">${drawPercent}%</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between;">
                                        <span>客胜:</span>
                                        <span style="font-weight: 600; font-size: 1.1em;">${losePercent}%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 详细数据部分 - 有间隔 -->
                        <div style="margin-top: 30px; padding-top: 25px; border-top: 2px solid rgba(255, 255, 255, 0.1);">
                            <h5 style="color: #bbdefb; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                                <i class="fas fa-chart-bar"></i> 详细数据
                            </h5>
                `;

                const period = webData.期数?.replace('期', '') || currentPeriod || '未知期数';

                downloadLink.download = `${period}期_web.json`;

                // 清理之前的URL

                showStatus('下载链接已生成，点击"下载JSON"按钮保存文件', 'success');

        // ========== SPF 共同对手数据逻辑 ==========
        const loadCommonMatchBtn = document.getElementById('loadCommonMatchBtn');

        const spfCommonSection = document.getElementById('spfCommonSection');
        const spfCommonBody = document.getElementById('spfCommonBody');
        
        function showSpfStatus(message, type = 'info') {
            spfStatusMessage.textContent = message;
            spfStatusMessage.className = `status ${type}`;
            setTimeout(() => {
                spfStatusMessage.className = 'status';
            }, type === 'error' ? 5000 : 3000);
        }
        
        function updateSpfProgress(percent) {
            spfProgressFill.style.width = `${percent}%`;
        }
        
        // 加载共同对手数据
        let oddsLookup = {}; // 赔率查找表，缓存赔率数据

        async function loadCommonMatchData() {
            showSpfStatus('正在加载共同对手数据...', 'info');
            updateSpfProgress(20);
            
            // 同时加载赔率数据
            try {
                const oddsResp = await fetch(`./spf/data/onsale_spf.json?t=${Date.now()}`);
                if (oddsResp.ok) {
                    const oddsData = await oddsResp.json();
                    // 以 home_team + '|' + away_team 为 key 建立查找表
                    const lookup = {};
                    oddsData.forEach(m => {
                        const key = (m.home_team || '') + '|' + (m.away_team || '');
                        lookup[key] = {
                            spf: m.spf_odds || {},
                            nspf: m.nspf_odds || {},
                            goal_line: m.nspf_goal_line || '',
                            match_num_str: m.match_num_str || ''
                        };
                    });
                    oddsLookup = lookup;
                }
            } catch (e) {
                // 赔率加载失败不影响主要数据加载
                console.warn('赔率数据加载失败:', e.message);
            }

            // 加载半全场赔率数据
            try {
                const bqcResp = await fetch(`./spf/data/onsale_bqc.json?t=${Date.now()}`);
                if (bqcResp.ok) {
                    const bqcData = await bqcResp.json();
                    bqcData.forEach(m => {
                        const key = (m.home_team || '') + '|' + (m.away_team || '');
                        if (!oddsLookup[key]) {
                            oddsLookup[key] = {};
                        }
                        oddsLookup[key].bqc = m.bqc_odds || {};
                        oddsLookup[key].bqc_update_time = m.bqc_update_time || '';
                    });
                }
            } catch (e) {
                console.warn('半全场赔率数据加载失败:', e.message);
            }
            
            const url = `./spf/data/common_match.json?t=${Date.now()}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) {
                    throw new Error('common_match.json 不存在，请先运行 spf_fetch_history.py 生成数据');
                }
                const data = await resp.json();
                updateSpfProgress(70);
                
                renderCommonMatchData(data);
                spfCommonSection.style.display = 'block';
                updateSpfProgress(100);
                showSpfStatus(`成功加载 ${data.total_matches || 0} 场比赛的共同对手数据`, 'success');
            } catch (e) {
                updateSpfProgress(0);
                showSpfStatus(`加载失败: ${e.message}`, 'error');
            }
        }
        
        // 辅助：从 winningTeam 判断某支球队的赛果
        function getResultForTeam(teamName, m) {
            if (!m.winningTeam) return '-';
            if (m.winningTeam === 'draw') return '平';
            if (m.winningTeam === 'home') {
                return (m.homeTeamShortName === teamName) ? '胜' : '负';
            }
            if (m.winningTeam === 'away') {
                return (m.awayTeamShortName === teamName) ? '胜' : '负';
            }
            return '-';
        }
        
        // 辅助：渲染一场比赛记录的行 (用于共同对手和直接交锋)
        function renderMatchRow(m, highlightTeam, teamColor) {
            const parts = (m.fullCourtGoal || '?:?').split(':');
            const homeScore = parts[0] || '?';
            const awayScore = parts[1] || '?';
            const score = `${homeScore}-${awayScore}`;
            
            const halfParts = (m.halfTimeGoal || '').split(':');
            const halfScore = (halfParts.length === 2) ? `${halfParts[0]}-${halfParts[1]}` : '-';
            
            const result = getResultForTeam(highlightTeam, m);
            const resultColor = result === '胜' ? '#4caf50' : result === '负' ? '#f44336' : '#ff9800';
            
            const homeHighlight = m.homeTeamShortName === highlightTeam ? `color:${teamColor};font-weight:600` : '';
            const awayHighlight = m.awayTeamShortName === highlightTeam ? `color:${teamColor};font-weight:600` : '';
            
            return `<tr>
                <td style="padding: 4px 6px;">${m.matchDate || ''}</td>
                <td style="padding: 4px 6px; text-align: center; ${homeHighlight}">${m.homeTeamShortName || '-'}</td>
                <td style="padding: 4px 6px; text-align: center; font-weight:600;">${score}</td>
                <td style="padding: 4px 6px; text-align: center; color:#888; font-size:0.9em;">(${halfScore})</td>
                <td style="padding: 4px 6px; text-align: center; ${awayHighlight}">${m.awayTeamShortName || '-'}</td>
                <td style="padding: 4px 6px; text-align: center; color:${resultColor}; font-weight:600;">${result}</td>
                <td style="padding: 4px 6px; text-align: center; font-size:0.85em; color:#aaa;">${m.tournamentShortName || '-'}</td>
            </tr>`;
        }
        
        // 赔率颜色辅助函数
        function getOddsStyle(val) {
            if (!val) return 'color: #757575;';
            const num = parseFloat(val);
            if (!num) return 'color: #757575;';
            if (num <= 1.80) return 'color: #ff5722; font-weight: 700;';
            if (num <= 2.50) return 'color: #ff9800; font-weight: 600;';
            if (num <= 4.00) return 'color: #8bc34a;';
            if (num <= 6.00) return 'color: #9e9e9e;';
            return 'color: #757575;';
        }

        // 构建赔率网格（类似九宫格风格的三列网格）
        function buildOddsGrid(title, items, styleFn) {
            if (!items || items.length === 0) return '';
            let html = `<div style="margin-top: 3px; padding-top: 3px; border-top: 1px solid rgba(255,255,255,0.04);">`;
            html += `<span style="font-size: 0.65em; opacity: 0.4; display: block; margin-bottom: 2px;">${title}</span>`;
            html += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;">`;
            items.forEach(item => {
                const st = styleFn ? styleFn(item.val) : {};
                const bg = st.bg || 'rgba(255,255,255,0.03)';
                const color = st.color || '#9e9e9e';
                const displayVal = item.val && !isNaN(parseFloat(item.val)) ? parseFloat(item.val).toFixed(2) : '-';
                html += `<div style="text-align: center; padding: 3px 1px; background:${bg}; border-radius: 2px; font-size: 0.65em; color:${color};">${item.label}<br><span style="font-size: 1em;">${displayVal}</span></div>`;
            });
            html += `</div></div>`;
            return html;
        }

        // 渲染单场比赛的赔率
        function renderMatchOdds(homeTeam, awayTeam) {
            const key = (homeTeam || '') + '|' + (awayTeam || '');
            const odds = oddsLookup[key];
            if (!odds) {
                return '<div style="padding: 8px 12px; margin-top: 6px; font-size: 0.8em; opacity: 0.4; border-top: 1px solid rgba(255,255,255,0.05);">暂无赔率数据</div>';
            }
            
            const spf = odds.spf || {};
            const nspf = odds.nspf || {};
            const goalLine = odds.goal_line || '';
            
            // 赔率颜色映射（与九宫格一致）
            function getGridStyle(val) {
                if (!val) return { bg: 'rgba(255,255,255,0.03)', color: '#9e9e9e' };
                const num = parseFloat(val);
                if (!num) return { bg: 'rgba(255,255,255,0.03)', color: '#9e9e9e' };
                if (num <= 1.80) return { bg: 'rgba(255,87,34,0.15)', color: '#ff5722' };
                if (num <= 2.50) return { bg: 'rgba(255,152,0,0.12)', color: '#ff9800' };
                if (num <= 4.00) return { bg: 'rgba(139,195,74,0.1)', color: '#8bc34a' };
                if (num <= 6.00) return { bg: 'rgba(158,158,158,0.08)', color: '#9e9e9e' };
                return { bg: 'rgba(117,117,117,0.05)', color: '#757575' };
            }
            
            const spfItems = [
                { label: '胜', val: spf.win },
                { label: '平', val: spf.draw },
                { label: '负', val: spf.lost },
            ];
            const nspfItems = [
                { label: '胜', val: nspf.win },
                { label: '平', val: nspf.draw },
                { label: '负', val: nspf.lost },
            ];
            
            const spfHtml = buildOddsGrid('赔率', spfItems, getGridStyle);
            const nspfTitle = goalLine ? `让球 (${goalLine})` : '让球';
            const nspfHtml = buildOddsGrid(nspfTitle, nspfItems, getGridStyle);
            const bqcHtml = buildBqcHtml(odds);
            
            return `
                <div style="padding: 4px 12px 6px 12px; margin-top: 2px; border-top: 1px solid rgba(255,255,255,0.06);">
                    ${spfHtml}
                    ${nspfHtml}
                    ${bqcHtml}
                </div>`;
        }
        
        // 构建半全场九宫格HTML
        function buildBqcHtml(odds) {
            const bqc = odds.bqc || {};
            const bqcUpdate = odds.bqc_update_time || '';
            if (Object.keys(bqc).length === 0) return '';
            
            const gridOrder = [
                ['aa', 'ac', 'ab'],
                ['ca', 'cc', 'cb'],
                ['ba', 'bc', 'bb']
            ];
            const bqcLabels = {'aa':'胜胜','ac':'胜平','ab':'胜负','ca':'平胜','cc':'平平','cb':'平负','ba':'负胜','bc':'负平','bb':'负负'};
            
            let gridHtml = `<div style="margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.04);">`;
            gridHtml += `<span style="font-size: 0.65em; opacity: 0.4; display: block; margin-bottom: 2px;">半全场 ${bqcUpdate ? '· '+bqcUpdate : ''}</span>`;
            gridHtml += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;">`;
            
            gridOrder.forEach(row => {
                row.forEach(k => {
                    const val = bqc[k];
                    const label = bqcLabels[k] || k;
                    const num = parseFloat(val);
                    let color = '#9e9e9e';
                    let bg = 'rgba(255,255,255,0.03)';
                    if (!isNaN(num)) {
                        if (num < 5) { color = '#4caf50'; bg = 'rgba(76,175,80,0.15)'; }
                        else if (num < 10) { color = '#8bc34a'; bg = 'rgba(139,195,74,0.1)'; }
                        else if (num < 20) { color = '#ff9800'; bg = 'rgba(255,152,0,0.08)'; }
                        else { color = '#f44336'; bg = 'rgba(244,67,54,0.08)'; }
                    }
                    const displayVal = val && !isNaN(num) ? num.toFixed(2) : '-';
                    gridHtml += `<div style="text-align: center; padding: 2px 1px; background:${bg}; border-radius: 2px; font-size: 0.65em; color:${color};">${label}<br><span style="font-size: 1em;">${displayVal}</span></div>`;
                });
            });
            
            gridHtml += `</div></div>`;
            return gridHtml;
        }

        // 渲染共同对手数据

                } else {

                // ====== 直接交锋记录区块 ======
                if (match.direct_match_info && match.direct_match_info.match_count > 0) {
                    const dmi = match.direct_match_info;
                    html += `
                        <div style="margin-top: 12px; padding: 10px; background: rgba(156,39,176,0.08); border-radius: 8px; border: 1px solid rgba(156,39,176,0.2);">

                        // 使用 match.home_team 作为高亮队伍来获取主队视角结果
                        const parts = (m.fullCourtGoal || '?:?').split(':');
                        const homeScore = parts[0] || '?';
                        const awayScore = parts[1] || '?';

                        const halfParts = (m.halfTimeGoal || '').split(':');
                        const halfScoreStr = (halfParts.length === 2) ? `${halfParts[0]}-${halfParts[1]}` : '-';
                        
                        const homeResult = getResultForTeam(match.home_team, m);
                        const resultColor = homeResult === '胜' ? '#4caf50' : homeResult === '负' ? '#f44336' : '#ff9800';
                        
                        const homeHighlight = m.homeTeamShortName === match.home_team ? 'color:#00bcd4;font-weight:600' : (m.homeTeamShortName === match.away_team ? 'color:#ff9800;font-weight:600' : '');
                        const awayHighlight = m.awayTeamShortName === match.home_team ? 'color:#00bcd4;font-weight:600' : (m.awayTeamShortName === match.away_team ? 'color:#ff9800;font-weight:600' : '');

                    html += `</table></div>`;

                // ====== 伤停信息区块 ======
                if (match.injury_suspension) {

                    const hasAwayInjuries = inj.away && inj.away.injuriesAndSuspensionsList && inj.away.injuriesAndSuspensionsList.length > 0;
                    
                    if (hasHomeInjuries || hasAwayInjuries) {

                        // 主队伤停

                            inj.home.injuriesAndSuspensionsList.forEach(p => {
                                const status = [];
                                if (p.injuryFlag === 1) status.push('伤');
                                if (p.suspensionFlag === 1) status.push('停');
                                const statusText = status.length > 0 ? status.join('+') : '-';
                                const statusColor = p.injuryFlag === 1 && p.suspensionFlag === 1 ? '#f44336' : p.injuryFlag === 1 ? '#ff9800' : '#e91e63';
                                html += `<tr>
                                    <td style="padding: 3px 6px;">${p.personName || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center; color:#aaa;">${p.playerPositionDesc || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center;">${p.uniformNo || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center;">${p.appearanceCnt || 0}</td>

                                </tr>`;

                            html += `</table></div>`;
                        }
                        
                        // 客队伤停
                        if (hasAwayInjuries) {
                            html += `<div>

                                <table style="width:100%; margin-top: 4px; border-collapse: collapse; font-size: 0.85em;">
                                    <tr style="background: rgba(255,152,0,0.08);">

                                html += `<tr>
