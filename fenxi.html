                    }
                }
                
                html += `</div>`;
            });
            
            spfCommonBody.innerHTML = html;
        }
        
        // SPF 预测按钮点击切换函数 - 每个按钮独立切换，互不影响
        function selectPredict(btn, outcome) {
            btn.classList.toggle('selected-' + outcome);
        }
        
        // 半全场 3/1/0 选择器 - 独立点选，可同时选中多个
        function selectHalfResult(btn) {
            const value = btn.dataset.bqcValue;
            const cls = value === '3' ? 'selected-win' : value === '1' ? 'selected-draw' : 'selected-lose';
            btn.classList.toggle(cls);
        }
        
        // 加载按钮事件
        loadCommonMatchBtn.addEventListener('click', loadCommonMatchData);
        
        // 页面加载后自动加载共同对手数据
        loadCommonMatchData();

        // 页面加载后自动获取14场最新期数并加载数据
        setTimeout(() => {
            fetchCurrentPeriod();
        }, 100);

        // ========== BQC 半全场数据逻辑 ==========
        const bqcStatusMessage = document.getElementById('bqcStatusMessage');
        const bqcProgressFill = document.getElementById('bqcProgressFill');
        const bqcCommonSection = document.getElementById('bqcCommonSection');
        const bqcCommonBody = document.getElementById('bqcCommonBody');
        
        function showBqcStatus(message, type = 'info') {
            bqcStatusMessage.textContent = message;
            bqcStatusMessage.className = `status ${type}`;
            setTimeout(() => {
                bqcStatusMessage.className = 'status';
            }, type === 'error' ? 5000 : 3000);
        }
        
        function updateBqcProgress(percent) {
            bqcProgressFill.style.width = `${percent}%`;
        }
        
        // 半全场赔率中文标签
        const BQC_ODDS_LABELS = {
            'aa': { label: '胜胜', desc: '主队半场胜/全场胜' },
            'ac': { label: '胜平', desc: '主队半场胜/全场平' },
            'ab': { label: '胜负', desc: '主队半场胜/全场负' },
            'ca': { label: '平胜', desc: '半场平/全场主队胜' },
            'cc': { label: '平平', desc: '半场平/全场平' },
            'cb': { label: '平负', desc: '半场平/全场客队胜' },
            'ba': { label: '负胜', desc: '主队半场负/全场胜' },
            'bc': { label: '负平', desc: '主队半场负/全场平' },
            'bb': { label: '负负', desc: '主队半场负/全场负' }
        };
        
        // 存储所有在售期数
        let bqcOnSalePeriods = [];
        let bqcActivePeriod = '';

        // 从 period.json 获取所有在售期数
        async function fetchBqcPeriods() {
            try {
                const resp = await fetch(`./banquanchang/period.json?t=${Date.now()}`);
                if (!resp.ok) throw new Error('period.json 不存在');
                const data = await resp.json();
                bqcOnSalePeriods = (data.on_sale || []).map(String).filter(p => p && p !== '0');
                return bqcOnSalePeriods;
            } catch (e) {
                console.warn('读取 period.json 失败:', e.message);
                bqcOnSalePeriods = [];
                return [];
            }
        }

        // 渲染期数标签
        function renderBqcPeriodTabs() {
            const container = document.getElementById('bqcPeriodTabs');
            if (!bqcOnSalePeriods.length) {
                container.innerHTML = '<div style="opacity:0.7;padding:5px 0;font-size:0.9em;">暂无在售期数</div>';
                return;
            }
            container.innerHTML = bqcOnSalePeriods.map(p =>
                `<span class="bqc-period-btn ${p === bqcActivePeriod ? 'active' : ''}" data-period="${p}" onclick="switchBqcPeriod('${p}')">第 ${p} 期</span>`
            ).join('');
        }

        // 切换期数
        async function switchBqcPeriod(period) {
            bqcActivePeriod = period;
            bqcCurrentPeriod = period;
            renderBqcPeriodTabs();
            await loadBqcCommonData(period);
        }
        
        // 加载半全场数据（指定期数）
        async function loadBqcCommonData(period) {
            if (!period) {
                if (bqcOnSalePeriods.length > 0) {
                    period = bqcOnSalePeriods[0];
                } else {
                    showBqcStatus('没有在售期数', 'error');
                    updateBqcProgress(0);
                    return;
                }
            }

            bqcCurrentPeriod = period;
            showBqcStatus(`正在加载期数 ${period} 的半全场数据...`, 'info');
            updateBqcProgress(30);
            
            const url = `./banquanchang/data/${period}_bqch_common.json?t=${Date.now()}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) {
                    throw new Error(`${period}_bqch_common.json 不存在，请先运行 bqch 数据管道生成数据`);
                }
                const data = await resp.json();
                updateBqcProgress(60);
                
                // 存储数据并渲染
                bqcAllData = data;
                bqcCommonSection.style.display = 'block';
                renderBqcCommonData();
                
                updateBqcProgress(100);
                showBqcStatus(`成功加载期数 ${period} 的 ${data.total_matches || 0} 场比赛数据`, 'success');
            } catch (e) {
                updateBqcProgress(0);
                showBqcStatus(`加载失败: ${e.message}`, 'error');
            }
        }
        
        // 渲染半全场数据
        function renderBqcCommonData() {
            if (!bqcAllData) return;
            const matches = bqcAllData.matches || [];
            if (!matches || matches.length === 0) {
                bqcCommonBody.innerHTML = `<p style="text-align: center; opacity: 0.7; padding: 20px;">期数 ${bqcCurrentPeriod}：暂无半全场数据</p>`;
                return;
            }
            
            let html = `<p style="margin-bottom: 20px; opacity: 0.8;">
                生成时间: ${bqcAllData.generate_time || '未知'} | 期数: ${bqcCurrentPeriod}期 | 总比赛数: ${matches.length} 场
                ${bqcAllData.lottery_sale_endtime ? ` | 投注截止: <span style="color:#ff9800;font-weight:600;">${bqcAllData.lottery_sale_endtime}</span>` : ''}
            </p>`;
            
            matches.forEach((match, idx) => {
                const count = match.common_opponent_count || 0;
                const tagClass = count > 0 ? 'has-data' : 'no-data';
                const tagText = count > 0 ? `共同对手: ${count} 队` : '无共同对手';
                const hasError = match.error ? true : false;
                
                // 相邻比赛之间的彩色分割线
                if (idx > 0) {
                    const hue = (idx * 47) % 360;
                    html += `
                        <div style="height: 2px; margin: 16px 0; border-radius: 2px; background: linear-gradient(90deg, transparent, hsl(${hue}, 80%, 60%), transparent);"></div>
                    `;
                }
                
                html += `
                    <div class="spf-match-card">
                        <div class="spf-match-header">
                            <div>
                                <h4 style="color: #00bcd4; margin-bottom: 5px;">
                                    第${match.matchnum || idx + 1}场 · ${match.league || '-'}
                                    ${match.match_id ? `<span style="font-size:0.7em; opacity:0.4; margin-left:8px;">ID: ${match.match_id}</span>` : ''}
                                </h4>
                                <p style="opacity: 0.8; font-size: 0.9em;">${match.date || ''}</p>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                                <span style="font-size: 0.9em;">
                                    ${match.home_team || ''}
                                    ${match.home_team_ranking ? `<span style="display:inline-block; margin-left: 4px; padding: 1px 8px; border-radius: 10px; background: rgba(76,175,80,0.15); color: #4caf50; font-weight:600; font-size:0.8em;">#${match.home_team_ranking} <span style="opacity:0.7; font-weight:400;">${match.home_team_fifa_points}分</span></span>` : ''}
                                    <span style="margin:0 6px; opacity:0.5;">vs</span>
                                    ${match.away_team || ''}
                                    ${match.away_team_ranking ? `<span style="display:inline-block; margin-left: 4px; padding: 1px 8px; border-radius: 10px; background: rgba(255,152,0,0.15); color: #ff9800; font-weight:600; font-size:0.8em;">#${match.away_team_ranking} <span style="opacity:0.7; font-weight:400;">${match.away_team_fifa_points}分</span></span>` : ''}
                                </span>
                                <span class="opponent-tag ${tagClass}">${tagText}</span>
                            </div>
                        </div>
                        
                        <details style="margin-top: 8px;">
                            <summary style="cursor: pointer; padding: 8px 14px; background: rgba(255,255,255,0.04); border-radius: 6px; font-size: 0.85em; color: #90caf9; user-select: none; border: 1px solid rgba(255,255,255,0.06); display: inline-block;">
                                📊 展开分析详情 ▼
                            </summary>
                `;
                
                // 半全场赔率表
                if (match.bqc_odds) {
                    const odds = match.bqc_odds;
                    html += `
                        <div style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px;">
                            <h5 style="color: #bbdefb; margin-bottom: 12px; font-size: 0.95em;">
                                <i class="fas fa-table"></i> 半全场赔率
                                <span style="font-size: 0.75em; opacity: 0.6; margin-left: 10px;">更新时间: ${odds.updatetime || '-'}</span>
                            </h5>
                            <table style="width:100%; border-collapse: collapse; font-size: 0.85em;">
                                <tr>
                    `;
                    // 9种赔率，按3x3网格排列
                    const bqcKeys = ['aa', 'ac', 'ab', 'ca', 'cc', 'cb', 'ba', 'bc', 'bb'];
                    bqcKeys.forEach((key, i) => {
                        const info = BQC_ODDS_LABELS[key];
                        const oddsVal = odds[key] || '-';
                        // 颜色梯度：赔率越低（越可能）越偏向绿色
                        const oddsNum = parseFloat(oddsVal);
                        let color = '#fff';
                        if (!isNaN(oddsNum)) {
                            if (oddsNum < 5) color = '#4caf50';
                            else if (oddsNum < 15) color = '#ff9800';
                            else color = '#f44336';
                        }
                        if (i % 3 === 0) html += '</tr><tr>';
                        html += `
                            <td class="bqc-odds-cell" data-key="${key}" style="padding: 8px 6px; text-align: center; border: 1px solid rgba(255,255,255,0.08);">
                                <div style="font-weight: 600; color: ${color}; font-size: 1.1em;">${oddsVal}</div>
                                <div style="font-size: 0.8em; opacity: 0.7;">${info.label}</div>
                                <div style="font-size: 0.7em; opacity: 0.5;">${info.desc}</div>
                            </td>
                        `;
                    });
                    html += `</tr></table></div>`;
                }
                
                // 上半场/下半场 3/1/0 选择器（始终显示）
                html += `
                    <div style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px;">
                        <div style="font-size: 0.85em; color: #bbdefb; font-weight: 600; margin-bottom: 10px;">
                            <i class="fas fa-futbol"></i> 半全场选择
                        </div>
                        <div class="bqc-half-predict" style="margin-bottom: 8px;">
                            <span style="font-size: 0.85em; color: #90caf9; font-weight: 600; min-width: 55px;">上半场</span>
                            <span class="bqc-half-btn" data-bqc-group="${idx}-first" data-bqc-value="3" onclick="selectHalfResult(this)">3</span>
                            <span class="bqc-half-btn" data-bqc-group="${idx}-first" data-bqc-value="1" onclick="selectHalfResult(this)">1</span>
                            <span class="bqc-half-btn" data-bqc-group="${idx}-first" data-bqc-value="0" onclick="selectHalfResult(this)">0</span>
                        </div>
                        <div class="bqc-half-predict">
                            <span style="font-size: 0.85em; color: #90caf9; font-weight: 600; min-width: 55px;">下半场</span>
                            <span class="bqc-half-btn" data-bqc-group="${idx}-second" data-bqc-value="3" onclick="selectHalfResult(this)">3</span>
                            <span class="bqc-half-btn" data-bqc-group="${idx}-second" data-bqc-value="1" onclick="selectHalfResult(this)">1</span>
                            <span class="bqc-half-btn" data-bqc-group="${idx}-second" data-bqc-value="0" onclick="selectHalfResult(this)">0</span>
                        </div>
                    </div>
                `;
                
                // 错误信息
                if (hasError) {
                    html += `
                        <div style="padding: 12px; background: rgba(244,67,54,0.1); border-radius: 8px; border-left: 3px solid #f44336; margin-bottom: 15px;">
                            <span style="color: #f44336; font-size: 0.9em;"><i class="fas fa-exclamation-triangle"></i> ${match.error}</span>
                        </div>
                    `;
                }
                
                // 主客队各自比赛记录数（始终显示）
                html += `<div style="padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px;">`;
                html += `
                    <div style="display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.9em;">
                        <span>🏠 ${match.home_team} 记录: <strong>${match.home_matches_count || 0}</strong> 场</span>
                        <span>✈️ ${match.away_team} 记录: <strong>${match.away_matches_count || 0}</strong> 场</span>
                    </div>
                `;
                
                // 共同对手数据
                if (count > 0 && match.common_opponent_data) {
                    const opponents = match.common_opponent_data;
                    const opponentNames = Object.keys(opponents);
                    if (opponentNames.length > 0) {
                        html += `<div style="font-size: 0.9em; margin-bottom: 12px;"><strong>共同对手:</strong> `;
                        html += opponentNames.map(name => 
                            `<span style="display: inline-block; padding: 2px 10px; margin: 2px 4px; background: rgba(0,188,212,0.1); border-radius: 10px;">${name}</span>`
                        ).join('');
                        html += `</div>`;
                        
                        // 详细比赛记录
                        html += `<div style="margin-top: 10px;">`;
                        opponentNames.forEach(name => {
                            const opp = opponents[name];
                            const isDirect = opp._is_direct_match;
                            const summaryColor = isDirect ? '#ff9800' : '#4caf50';
                            
                            html += `<details style="margin-bottom: 8px;">
                                <summary style="cursor: pointer; color: ${summaryColor}; font-weight: 600; font-size: 0.9em;">
                                    ${name} ${isDirect ? '⭐ 直接对战' : ''}
                                </summary>
                            `;
                            
                            // 渲染比赛记录表格（通用函数）
                            const renderMatchTable = (records, teamName, highlightTeam, accentColor) => {
                                if (!records || records.length === 0) return '';
                                let tableHtml = `<div style="margin: 8px 0 4px 16px; font-size: 0.85em;">
                                    <span style="color: ${accentColor};">${teamName} vs ${name}:</span>
                                    <table style="width:100%; margin-top: 4px; border-collapse: collapse; font-size: 0.9em;">
                                        <tr style="background: ${accentColor}15;">
                                            <th style="padding: 4px 6px; text-align: left;">日期</th>
                                            <th style="padding: 4px 6px; text-align: center;">赛制</th>
                                            <th style="padding: 4px 6px; text-align: center;">主队</th>
                                            <th style="padding: 4px 6px; text-align: center;">全场</th>
                                            <th style="padding: 4px 6px; text-align: center;">半场</th>
                                            <th style="padding: 4px 6px; text-align: center;">客队</th>
                                            <th style="padding: 4px 6px; text-align: center;">结果</th>
                                        </tr>`;
                                records.forEach(m => {
                                    const score = `${m.homescore}-${m.awayscore}`;
                                    const halfScore = (m.homehalfscore !== undefined && m.awayhalfscore !== undefined) 
                                        ? `${m.homehalfscore}-${m.awayhalfscore}` : '-';
                                    const isHighlighted = m.homesxname === highlightTeam || m.awaysxname === highlightTeam;
                                    const result = isHighlighted ? 
                                        (m.homesxname === highlightTeam ? m.result1 : m.result2) :
                                        (m.homesxname === teamName ? m.result1 : m.result2);
                                    const resultColor = result === '胜' ? '#4caf50' : result === '负' ? '#f44336' : '#ff9800';
                                    tableHtml += `<tr>
                                        <td style="padding: 4px 6px;">${m.matchdate || ''}</td>
                                        <td style="padding: 4px 6px; text-align: center; font-size:0.85em; opacity:0.8;">${m.tournamentShortName || '-'}</td>
                                        <td style="padding: 4px 6px; text-align: center; ${m.homesxname === highlightTeam ? `color:${accentColor};font-weight:600` : ''}">${m.homesxname}</td>
                                        <td style="padding: 4px 6px; text-align: center; font-weight:600;">${score}</td>
                                        <td style="padding: 4px 6px; text-align: center; color:#ff9800; font-weight:500;">(${halfScore})</td>
                                        <td style="padding: 4px 6px; text-align: center; ${m.awaysxname === highlightTeam ? `color:${accentColor};font-weight:600` : ''}">${m.awaysxname}</td>
                                        <td style="padding: 4px 6px; text-align: center; color:${resultColor}; font-weight:600;">${result}</td>
                                    </tr>`;
                                });
                                tableHtml += `</table></div>`;
                                return tableHtml;
                            };
                            
                            // 主队 vs 共同对手
                            if (opp.home_vs_opponent && opp.home_vs_opponent.length > 0) {
                                html += renderMatchTable(opp.home_vs_opponent, match.home_team, match.home_team, '#00bcd4');
                            }
                            
                            // 客队 vs 共同对手
                            if (opp.away_vs_opponent && opp.away_vs_opponent.length > 0) {
                                html += renderMatchTable(opp.away_vs_opponent, match.away_team, match.away_team, '#ff9800');
                            }
                            
                            html += `</details>`;
                        });
                        html += `</div>`;
                    }
                } else if (!hasError) {
                    html += `<p style="font-size: 0.9em; opacity: 0.6; padding: 0px 0 10px 0;">该场比赛未能匹配到共同对手数据</p>`;
                }
                html += `</div>`;
                
                // ====== 伤停信息区块 ======
                if (match.injury) {
                    const inj = match.injury;
                    const hasHomeInjury = inj.home && Array.isArray(inj.home) && inj.home.length > 0;
                    const hasAwayInjury = inj.away && Array.isArray(inj.away) && inj.away.length > 0;
                    
                    if (hasHomeInjury || hasAwayInjury) {
                        html += `
                            <div style="margin-top: 12px; padding: 10px; background: rgba(233,30,99,0.06); border-radius: 8px; border: 1px solid rgba(233,30,99,0.15);">
                                <div style="font-weight:600; color:#f48fb1; margin-bottom: 8px; font-size:0.95em;">🩹 伤停信息</div>`;
                        
                        // 主队伤停
                        if (hasHomeInjury) {
                            html += `<div style="margin-bottom: 10px;">
                                <span style="color:#00bcd4; font-weight:600; font-size:0.9em;">${match.home_team}</span>
                                <table style="width:100%; margin-top: 4px; border-collapse: collapse; font-size: 0.85em;">
                                    <tr style="background: rgba(0,188,212,0.08);">
                                        <th style="padding: 3px 6px; text-align: left;">球员</th>
                                        <th style="padding: 3px 6px; text-align: center;">位置</th>
                                        <th style="padding: 3px 6px; text-align: center;">号码</th>
                                        <th style="padding: 3px 6px; text-align: center;">出场</th>
                                        <th style="padding: 3px 6px; text-align: center;">状态</th>
                                    </tr>`;
                            inj.home.forEach(p => {
                                const status = [];
                                if (p.injuryFlag === 1) status.push('伤');
                                if (p.suspensionFlag === 1) status.push('停');
                                const statusText = status.length > 0 ? status.join('+') : '-';
                                const statusColor = p.injuryFlag === 1 && p.suspensionFlag === 1 ? '#f44336' : p.injuryFlag === 1 ? '#ff9800' : '#e91e63';
                                html += `<tr>
                                    <td style="padding: 3px 6px;">${p.personName || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center; color:#aaa;">${p.playerPositionDesc || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center;">${p.uniformNo || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center;">${p.appearanceCnt || 0}</td>
                                    <td style="padding: 3px 6px; text-align: center; color:${statusColor}; font-weight:600;">${statusText}</td>
                                </tr>`;
                            });
                            html += `</table></div>`;
                        }
                        
                        // 客队伤停
                        if (hasAwayInjury) {
                            html += `<div>
                                <span style="color:#ff9800; font-weight:600; font-size:0.9em;">${match.away_team}</span>
                                <table style="width:100%; margin-top: 4px; border-collapse: collapse; font-size: 0.85em;">
                                    <tr style="background: rgba(255,152,0,0.08);">
                                        <th style="padding: 3px 6px; text-align: left;">球员</th>
                                        <th style="padding: 3px 6px; text-align: center;">位置</th>
                                        <th style="padding: 3px 6px; text-align: center;">号码</th>
                                        <th style="padding: 3px 6px; text-align: center;">出场</th>
                                        <th style="padding: 3px 6px; text-align: center;">状态</th>
                                    </tr>`;
                            inj.away.forEach(p => {
                                const status = [];
                                if (p.injuryFlag === 1) status.push('伤');
                                if (p.suspensionFlag === 1) status.push('停');
                                const statusText = status.length > 0 ? status.join('+') : '-';
                                const statusColor = p.injuryFlag === 1 && p.suspensionFlag === 1 ? '#f44336' : p.injuryFlag === 1 ? '#ff9800' : '#e91e63';
                                html += `<tr>
                                    <td style="padding: 3px 6px;">${p.personName || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center; color:#aaa;">${p.playerPositionDesc || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center;">${p.uniformNo || '-'}</td>
                                    <td style="padding: 3px 6px; text-align: center;">${p.appearanceCnt || 0}</td>
                                    <td style="padding: 3px 6px; text-align: center; color:${statusColor}; font-weight:600;">${statusText}</td>
                                </tr>`;
                            });
                            html += `</table></div>`;
                        }
                        
                        html += `</div>`;
                    }
                }
                
                // ====== 直接交锋历史(h2h)区块 ======
                if (match.h2h && Array.isArray(match.h2h) && match.h2h.length > 0) {
                    html += `
                        <div style="margin-top: 12px; padding: 10px; background: rgba(156,39,176,0.06); border-radius: 8px; border: 1px solid rgba(156,39,176,0.15);">
                            <div style="font-weight:600; color:#ce93d8; margin-bottom: 8px; font-size:0.95em;">⚔️ 直接交锋历史 (${match.h2h.length} 场)</div>
                            <table style="width:100%; border-collapse: collapse; font-size: 0.85em;">
                                <tr style="background: rgba(156,39,176,0.08);">
                                    <th style="padding: 4px 6px; text-align: left;">日期</th>
                                    <th style="padding: 4px 6px; text-align: center;">赛制</th>
                                    <th style="padding: 4px 6px; text-align: center;">主队</th>
                                    <th style="padding: 4px 6px; text-align: center;">全场</th>
                                    <th style="padding: 4px 6px; text-align: center;">半场</th>
                                    <th style="padding: 4px 6px; text-align: center;">客队</th>
                                    <th style="padding: 4px 6px; text-align: center;">结果</th>
                                </tr>`;
                    match.h2h.forEach(m => {
                        const score = `${m.homescore}-${m.awayscore}`;
                        const halfScore = (m.homehalfscore !== undefined && m.awayhalfscore !== undefined) 
                            ? `${m.homehalfscore}-${m.awayhalfscore}` : '-';
                        // 从主队角度判断结果
                        const homeResult = m.homesxname === match.home_team ? m.result1 : 
                                          (m.awaysxname === match.home_team ? m.result2 : '-');
                        const resultColor = homeResult === '胜' ? '#4caf50' : homeResult === '负' ? '#f44336' : '#ff9800';
                        const homeHighlight = m.homesxname === match.home_team ? 'color:#00bcd4;font-weight:600' : 
                                             (m.homesxname === match.away_team ? 'color:#ff9800;font-weight:600' : '');
                        const awayHighlight = m.awaysxname === match.home_team ? 'color:#00bcd4;font-weight:600' : 
                                             (m.awaysxname === match.away_team ? 'color:#ff9800;font-weight:600' : '');
                        html += `<tr>
                            <td style="padding: 4px 6px;">${m.matchdate || ''}</td>
                            <td style="padding: 4px 6px; text-align: center; font-size:0.85em; opacity:0.8;">${m.tournamentShortName || '-'}</td>
                            <td style="padding: 4px 6px; text-align: center; ${homeHighlight}">${m.homesxname}</td>
                            <td style="padding: 4px 6px; text-align: center; font-weight:600;">${score}</td>
                            <td style="padding: 4px 6px; text-align: center; color:#ff9800; font-weight:500;">(${halfScore})</td>
                            <td style="padding: 4px 6px; text-align: center; ${awayHighlight}">${m.awaysxname}</td>
                            <td style="padding: 4px 6px; text-align: center; color:${resultColor}; font-weight:600;">${homeResult}</td>
                        </tr>`;
                    });
                    html += `</table></div>`;
                }
                
                html += `</details></div>`;
            });
            
            bqcCommonBody.innerHTML = html;
        }
        
        // 页面加载后自动获取期数列表，渲染标签，加载第一个期数数据
        (async function autoLoadBqcData() {
            await fetchBqcPeriods();
            renderBqcPeriodTabs();
            if (bqcOnSalePeriods.length > 0) {
                const firstPeriod = bqcOnSalePeriods[0];
                bqcActivePeriod = firstPeriod;
                bqcCurrentPeriod = firstPeriod;
                renderBqcPeriodTabs();
                loadBqcCommonData(firstPeriod);
            } else {
                showBqcStatus('无法获取在售期数', 'error');
            }
        })();

    </script>
</body>
</html>
