<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级大乐透 — 开奖预测分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #1a1a2e; padding: 20px; }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 32px 40px; border-radius: 16px; margin-bottom: 24px; }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
  .header p { margin-top: 8px; font-size: 14px; opacity: .7; }

  /* Prediction Cards */
  .pred-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .pred-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); border-top: 4px solid #e94560; transition: transform .15s; }
  .pred-card:hover { transform: translateY(-2px); }
  .pred-card .method-name { font-size: 15px; font-weight: 700; color: #e94560; margin-bottom: 4px; }
  .pred-card .method-desc { font-size: 12px; color: #888; margin-bottom: 14px; line-height: 1.4; }
  .pred-card .label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .pred-card .balls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .ball-front, .ball-back { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
  .ball-front { background: linear-gradient(135deg, #e94560, #c23152); }
  .ball-back { background: linear-gradient(135deg, #0f3460, #1a5276); }

  /* Zone Section */
  .zone-section { background: #fff; border-radius: 14px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .zone-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #f0f2f5; }
  .zone-title .badge { display: inline-block; font-size: 12px; font-weight: 400; background: #f0f2f5; color: #666; padding: 2px 10px; border-radius: 20px; margin-left: 8px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f8f9fa; color: #555; font-weight: 600; padding: 10px 8px; text-align: center; border-bottom: 2px solid #e8e8e8; position: sticky; top: 0; white-space: nowrap; }
  td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #f0f2f5; }
  tr:hover td { background: #fafbfc; }
  .num-cell { font-weight: 700; }
  .overdue-high { color: #e94560; font-weight: 700; }
  .overdue-mid { color: #e67e22; font-weight: 600; }
  .overdue-low { color: #27ae60; }

  /* Bar in overdue cell */
  .bar-wrap { display: flex; align-items: center; gap: 6px; }
  .bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; max-width: 80px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }

  /* Tab switch */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn { padding: 8px 20px; border: none; background: #e8e8e8; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all .15s; }
  .tab-btn.active { background: #e94560; color: #fff; }
  .tab-btn:hover:not(.active) { background: #ddd; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .footer { text-align: center; color: #aaa; font-size: 12px; padding: 20px 0; }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script data-cfasync="false">
const COLORS = ['#e94560','#e67e22','#2ecc71','#3498db','#9b59b6'];

// 显示加载状态
document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px;color:#999;">加载数据中...</div>';

// 动态加载最新 JSON（本地 file:// 或 GitHub Pages 均适用）
fetch('kaijiangdata/daletou_prediction.json?_t=' + Date.now())
  .then(r => r.ok ? r.json() : Promise.reject(new Error('fetch failed')))
  .then(data => render(data))
  .catch(() => {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px;color:#e94560;">数据加载失败，请刷新重试</div>';
  });

function render(DATA) {
  const { analysis, predictions } = DATA;
  const app = document.getElementById('app');
  let html = '';

  // Header
  html += `<div class="header">
    <h1>超级大乐透 &mdash; 开奖预测分析</h1>
    <p>基于 ${analysis.total_draws} 期历史开奖数据（2007&ndash;2026），${predictions.length} 种方法预测下一期号码</p>
  </div>`;

  // Prediction Cards
  html += `<div class="pred-grid">`;
  predictions.forEach((p, i) => {
    const front = p.front_zone.map(n => `<span class="ball-front">${String(n).padStart(2,'0')}</span>`).join('');
    const back = p.back_zone.map(n => `<span class="ball-back">${String(n).padStart(2,'0')}</span>`).join('');
    html += `<div class="pred-card" style="border-top-color:${COLORS[i % COLORS.length]}">
      <div class="method-name" style="color:${COLORS[i % COLORS.length]}">${p.name}</div>
      <div class="method-desc">${p.desc}</div>
      <div class="label">前区 (5)</div>
      <div class="balls">${front}</div>
      <div class="label">后区 (2)</div>
      <div class="balls">${back}</div>
    </div>`;
  });
  html += `</div>`;

  // Tabs + Tables
  html += `<div class="zone-section">
    <div class="zone-title">号码间隔分析 <span class="badge">逾期比 &gt; 1 表示超过平均间隔</span></div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="front">前区 (1-35)</button>
      <button class="tab-btn" data-tab="back">后区 (1-12)</button>
    </div>`;

  // Front zone table
  html += `<div class="tab-panel active" id="tab-front"><div class="table-wrap"><table>
    <thead><tr>
      <th>号码</th><th>出现次数</th><th>平均间隔</th><th>中位间隔</th><th>最大间隔</th><th>当前未出</th><th>逾期比</th>
    </tr></thead><tbody>`;
  const frontArr = Object.entries(analysis.front_zone).map(([k,v]) => ({n:parseInt(k), ...v}));
  const maxOverdueFront = Math.max(...frontArr.map(d => d.overdue_ratio || 0));
  frontArr.sort((a,b) => (b.overdue_ratio||0) - (a.overdue_ratio||0)).forEach(d => {
    const cls = d.overdue_ratio >= 2 ? 'overdue-high' : d.overdue_ratio >= 1 ? 'overdue-mid' : 'overdue-low';
    const pct = maxOverdueFront > 0 ? (d.overdue_ratio / maxOverdueFront * 100) : 0;
    const barColor = d.overdue_ratio >= 2 ? '#e94560' : d.overdue_ratio >= 1 ? '#e67e22' : '#27ae60';
    html += `<tr>
      <td class="num-cell">${String(d.n).padStart(2,'0')}</td>
      <td>${d.count}</td>
      <td>${d.avg_gap}</td>
      <td>${d.median_gap}</td>
      <td>${d.max_gap}</td>
      <td>${d.last_gap}</td>
      <td><div class="bar-wrap"><span class="${cls}">${d.overdue_ratio.toFixed(2)}</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor}"></div></div></div></td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  // Back zone table
  html += `<div class="tab-panel" id="tab-back"><div class="table-wrap"><table>
    <thead><tr>
      <th>号码</th><th>出现次数</th><th>平均间隔</th><th>中位间隔</th><th>最大间隔</th><th>当前未出</th><th>逾期比</th>
    </tr></thead><tbody>`;
  const backArr = Object.entries(analysis.back_zone).map(([k,v]) => ({n:parseInt(k), ...v}));
  const maxOverdueBack = Math.max(...backArr.map(d => d.overdue_ratio || 0));
  backArr.sort((a,b) => (b.overdue_ratio||0) - (a.overdue_ratio||0)).forEach(d => {
    const cls = d.overdue_ratio >= 2 ? 'overdue-high' : d.overdue_ratio >= 1 ? 'overdue-mid' : 'overdue-low';
    const pct = maxOverdueBack > 0 ? (d.overdue_ratio / maxOverdueBack * 100) : 0;
    const barColor = d.overdue_ratio >= 2 ? '#e94560' : d.overdue_ratio >= 1 ? '#e67e22' : '#27ae60';
    html += `<tr>
      <td class="num-cell">${String(d.n).padStart(2,'0')}</td>
      <td>${d.count}</td>
      <td>${d.avg_gap}</td>
      <td>${d.median_gap}</td>
      <td>${d.max_gap}</td>
      <td>${d.last_gap}</td>
      <td><div class="bar-wrap"><span class="${cls}">${d.overdue_ratio.toFixed(2)}</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor}"></div></div></div></td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  html += `</div>`;
  html += `<div class="footer">数据来源: sporttery.cn 官方API &middot; 预测仅供参考</div>`;

  app.innerHTML = html;

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
}
</script>
</body>
</html>
