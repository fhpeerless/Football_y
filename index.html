<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .password-input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(145deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loading {
            display: none;
            color: #fff;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>密码验证</h1>

        <div class="input-group">
            <label for="password">请输入密码</label>
            <input type="password" id="password" class="password-input" placeholder="请输入密码" autocomplete="off">
        </div>

        <button class="btn btn-submit" onclick="verifyPassword()">验证密码</button>

        <div class="error-msg" id="errorMsg">密码错误，请重新输入！</div>
        <div class="loading" id="loading">加载中...</div>
    </div>

    <script>
        let config = null;

        async function loadConfig() {
            try {
                document.getElementById('loading').style.display = 'block';
                const response = await fetch('password_config.json');
                config = await response.json();
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('加载配置文件失败:', error);
                document.getElementById('errorMsg').textContent = '加载配置文件失败';
                document.getElementById('errorMsg').classList.add('show');
                document.getElementById('loading').style.display = 'none';
            }
        }

        function verifyPassword() {
            const inputPassword = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!config || !config.passwords) {
                errorMsg.textContent = '配置加载失败';
                errorMsg.classList.add('show');
                return;
            }

            if (config.passwords.includes(inputPassword)) {
                errorMsg.classList.remove('show');
                window.location.href = config.redirectUrl || 'fenxi.html';
            } else {
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 2000);
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyPassword();
            }
        });

        window.onload = loadConfig;
    </script>
</body>
</html>
