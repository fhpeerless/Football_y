name: Clear GitHub Pages Cache

on:
  workflow_run:
    workflows: ["Football Prediction Pipeline"]
    types:
      - completed
  workflow_dispatch:

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 创建空提交以触发 Pages 更新
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 创建一个空提交来触发 GitHub Pages 重新构建
        git commit --allow-empty -m "触发 Pages 缓存更新 [skip ci]"
        git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
        
    - name: 等待 Pages 更新
      run: |
        echo "等待 GitHub Pages 更新缓存..."
        sleep 30
        echo "缓存更新请求已发送"
