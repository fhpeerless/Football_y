name: SPF Data Collection

on:
  schedule:
    # 北京时间 9:00, 15:00, 21:00 执行 (UTC = BJT-8)
    - cron: '0 1,7,13 * * *'
  workflow_dispatch:

jobs:
  collect-spf-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        pip install requests

    - name: 获取所有比赛赔率数据
      working-directory: ./spf
      run: |
        echo "=== 获取所有比赛赔率数据 ==="
        python mobile_spf_fetcher.py
        echo "=== 数据获取完成 ==="

    - name: 爬取历史数据并提取共同对手
      working-directory: ./spf
      run: |
        echo "=== 爬取历史数据 & 分析共同对手 ==="
        python spf_fetch_history.py
        echo "=== 处理完成 ==="

    - name: 提交 SPF 数据到仓库
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add spf/data/

        git commit -m "更新SPF赔率数据/共同对手数据" || {
          echo "没有更改可提交，跳过push步骤"
          exit 0
        }

        git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}" || {
          echo "第一次push失败，等待3秒后重试..."
          sleep 3
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
        }
