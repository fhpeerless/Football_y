name: BQC Data Collection

on:
  schedule:
    # 北京时间 8:01, 9:01, 11:01, 12:01, 14:01, 20:01, 22:01 执行 (UTC = BJT-8)
    - cron: '1 0,1,3,4,6,12,14 * * *'
  workflow_dispatch:

jobs:
  collect-bqc-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install --upgrade curl_cffi
        # 验证 curl_cffi 安装和版本
        python -c "import curl_cffi; print(f'curl_cffi 版本: {curl_cffi.__version__}')"

    - name: 网络诊断 (排查API连接问题)
      run: |
        echo "=== 测试 sporttery.cn API 连通性 ==="
        curl -s --max-time 15 \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36" \
          -H "Accept: application/json, text/javascript, */*; q=0.01" \
          -H "Accept-Language: zh-CN,zh;q=0.9" \
          -H "Accept-Encoding: gzip, deflate, br, zstd" \
          -H "Referer: https://www.sporttery.cn/" \
          -H "Origin: https://www.sporttery.cn" \
          -H "Sec-CH-UA: \"Chromium\";v=\"148\", \"Google Chrome\";v=\"148\", \"Not/A)Brand\";v=\"99\"" \
          -H "Sec-CH-UA-Mobile: ?0" \
          -H "Sec-CH-UA-Platform: \"Windows\"" \
          -H "Sec-Fetch-Dest: empty" \
          -H "Sec-Fetch-Mode: cors" \
          -H "Sec-Fetch-Site: same-site" \
          "https://webapi.sporttery.cn/gateway/lottery/getFootBallMatchV1.qry?param=98,0&lotteryDrawNum=&sellStatus=0&termLimits=1" 2>&1 | head -c 500 || echo "sporttery.cn 不可达"
        echo ""
        echo "=== 测试 500.com XML 连通性 ==="
        curl -s --max-time 15 \
          -H "User-Agent: Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15" \
          -H "Referer: https://trade.500.com/jczq/" \
          "https://trade.500.com/static/public/jczq/newxml/pl/pl_bqc_2.xml" 2>&1 | head -c 300 || echo "500.com 不可达"

    - name: 获取半全场所有比赛信息
      id: fetch_matches
      working-directory: ./banquanchang
      run: |
        echo "=== 获取半全场比赛信息 ==="
        python bqchmatch_requst.py
        echo "=== 获取完成 ==="

    - name: 爬取主客队历史比赛
      if: steps.fetch_matches.outputs.bqch_status == 'continue'
      working-directory: ./banquanchang
      run: |
        echo "=== 爬取主客队历史比赛 ==="
        python bqch_home_away_history_request.py
        echo "=== 爬取完成 ==="

    - name: 分析共同比赛
      if: steps.fetch_matches.outputs.bqch_status == 'continue'
      working-directory: ./banquanchang
      run: |
        echo "=== 分析共同比赛 ==="
        python find_bqch_common.py
        echo "=== 分析完成 ==="

    - name: 添加 FIFA 排名到共同对手数据
      if: steps.fetch_matches.outputs.bqch_status == 'continue'
      working-directory: ./banquanchang
      run: |
        echo "=== 添加 FIFA 排名到共同对手数据 ==="
        python add_ranking_to_common.py
        echo "=== 添加完成 ==="

    - name: 提交 BQC 数据到仓库
      if: steps.fetch_matches.outputs.bqch_status == 'continue'
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # 删除旧格式的聚合文件（新格式按期数拆分）
        git rm --ignore-unmatch banquanchang/data/bqch_match.json banquanchang/data/bqch_homaway_history.json banquanchang/data/bqch_common.json

        git add banquanchang/period.json banquanchang/data/*_bqch_*.json

        git commit -m "更新BQC半全场数据/共同对手数据" || {
          echo "没有更改可提交，跳过push步骤"
          exit 0
        }

        git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}" || {
          echo "第一次push失败，等待3秒后重试..."
          sleep 3
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
        }
