<body>
    <div class="container">

            <p class="subtitle">鏌ョ湅宸茬敓鎴愮殑棰勬祴姒傜巼鍚堝苟缁撴灉锛坵eb.json鏁版嵁锛?/p>
        </header>
        
        <div class="main-content">
            <div class="control-panel">

                        <button class="match-btn" data-match="5">绗?鍦?/button>
                        <button class="match-btn" data-match="6">绗?鍦?/button>

                        璇峰厛鑾峰彇鏈熸暟锛岀劧鍚庣偣鍑?鍔犺浇Web鏁版嵁"鎸夐挳鏌ョ湅棰勬祴缁撴灉
                    </p>

                <a href="#" id="downloadLink" class="download-link" style="display: none;">

    <script>
        // 鍏ㄥ眬鍙橀噺
        let currentPeriod = '';
        let webData = null;
        // DOM鍏冪礌
        const periodInput = document.getElementById('periodInput');
        const fetchPeriodBtn = document.getElementById('fetchPeriodBtn');
        const loadWebDataBtn = document.getElementById('loadWebDataBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadLink = document.getElementById('downloadLink');
        const statusMessage = document.getElementById('statusMessage');
        const progressFill = document.getElementById('progressFill');
        const resultsContainer = document.getElementById('resultsContainer');
        
        // 鏄剧ず鐘舵€佹秷鎭?
        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status ${type}`;
            setTimeout(() => {
                statusMessage.className = 'status';
            }, type === 'error' ? 5000 : 3000);
        }
        
        // 鏇存柊杩涘害鏉?
        function updateProgress(percent) {
            progressFill.style.width = `${percent}%`;
        }
        
        // 鑾峰彇褰撳墠鏈熸暟
        async function fetchCurrentPeriod() {
            try {
                showStatus('姝ｅ湪浠巔resent.json鑾峰彇褰撳墠鏈熸暟...', 'info');
                updateProgress(30);
                
                try {
                    // 娣诲姞鏃堕棿鎴抽槻姝㈢紦瀛?
                    const timestamp = Date.now();
                    const url = `./present.json?t=${timestamp}`;
                    console.log(`姝ｅ湪璇锋眰: ${url}`);
                    
                    const response = await fetch(url);
                    console.log(`鍝嶅簲鐘舵€? ${response.status} ${response.statusText}`);
                    console.log(`鍝嶅簲 URL: ${response.url}`);
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log('鑾峰彇鍒扮殑鏁版嵁:', data);
                        
                        // 楠岃瘉鏁版嵁鏍煎紡
                        if (Array.isArray(data) && data.length > 0) {
                            // 鑾峰彇鏈€鍚庝竴涓潯鐩殑鏈熸暟锛堟渶鏂版湡鏁帮級
                            const lastEntry = data[data.length - 1];
                            console.log('鏈€鍚庝竴鏉¤褰?', lastEntry);
                            
                            const period = lastEntry.period || lastEntry.period_number?.toString() || '';
                            
                            if (period) {
                                currentPeriod = period.toString();
                                periodInput.value = currentPeriod;
                                updateProgress(100);
                                showStatus(`鎴愬姛鑾峰彇褰撳墠鏈熸暟: ${currentPeriod}鏈焋, 'success');
                                console.log(`浠巔resent.json鑾峰彇鍒版渶鏂版湡鏁? ${period}`);
                                
                                // 鑾峰彇鏈熸暟鍚庤嚜鍔ㄥ姞杞絯eb.json鏁版嵁
                                setTimeout(() => {
                                    loadWebDataBtn.click();
                                }, 500);
                                
                                return currentPeriod;
                            }
                        } else {
                            console.error('鏁版嵁鏍煎紡閿欒: 涓嶆槸鏁扮粍鎴栨暟缁勪负绌?);
                        }
                    } else {
                        console.error(`HTTP 閿欒: ${response.status} ${response.statusText}`);
                    }
                    
                    // 鑾峰彇澶辫触锛屾彁绀虹敤鎴锋墜鍔ㄨ緭鍏?
                    console.log('鏃犳硶浠巔resent.json鑾峰彇鏈熸暟');
                    periodInput.placeholder = '璇锋墜鍔ㄨ緭鍏ユ湡鏁?;
                    updateProgress(0);
                    showStatus('鏃犳硶鑾峰彇鏈熸暟锛岃鎵嬪姩杈撳叆', 'error');
                    return null;
                    
                } catch (fileError) {
                    console.error('璇诲彇present.json鏂囦欢澶辫触:', fileError);
                    console.error('閿欒鍫嗘爤:', fileError.stack);
                    periodInput.placeholder = '璇锋墜鍔ㄨ緭鍏ユ湡鏁?;
                    updateProgress(0);
                    showStatus(`璇诲彇鏈熸暟鏂囦欢澶辫触: ${fileError.message}`, 'error');
                    return null;
                }
            } catch (error) {
                console.error('鑾峰彇鏈熸暟閿欒:', error);
                periodInput.placeholder = '璇锋墜鍔ㄨ緭鍏ユ湡鏁?;
                updateProgress(0);
                showStatus(`鑾峰彇鏈熸暟澶辫触: ${error.message}锛岃鎵嬪姩杈撳叆`, 'error');
                return null;
            }
        }
        

        
        // 鍔犺浇Web JSON鏁版嵁
        async function loadWebData() {
            // 浠庤緭鍏ユ璇诲彇褰撳墠鏈熸暟
            const inputPeriod = periodInput.value.trim();
            if (inputPeriod) {
                // 鎻愬彇鏁板瓧閮ㄥ垎锛堜緥濡備粠"26027鏈?涓彁鍙?26027"锛?
                const periodMatch = inputPeriod.match(/\d+/);
                if (periodMatch) {
                    currentPeriod = periodMatch[0];
                } else {
                    currentPeriod = inputPeriod;
                }
            }
            
            if (!currentPeriod) {
                showStatus('璇峰厛鑾峰彇鎴栬緭鍏ユ湡鏁?, 'error');
                return null;
            }
            
            try {
                showStatus(`姝ｅ湪鍔犺浇 ${currentPeriod}鏈焈web.json 鏂囦欢...`, 'info');
                updateProgress(40);
                
                const timestamp = Date.now();
                const fileUrl = `./result/${currentPeriod}鏈焈web.json?t=${timestamp}`;
                console.log(`姝ｅ湪鍔犺浇: ${fileUrl}`);
                
                const response = await fetch(fileUrl);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`鏂囦欢涓嶅瓨鍦? ${fileUrl}锛岃纭繚宸茬敓鎴愯鏂囦欢`);
                    } else {
                        throw new Error(`HTTP閿欒: ${response.status} ${response.statusText}`);
                    }
                }
                
                const data = await response.json();
                updateProgress(80);
                
                // 楠岃瘉鏁版嵁鏍煎紡
                if (!data.鏈熸暟 || !data.璁＄畻缁撴灉 || !Array.isArray(data.璁＄畻缁撴灉)) {
                    throw new Error('web.json鏂囦欢鏍煎紡涓嶆纭?);
                }
                
                webData = data;
                updateProgress(100);
                showStatus(`鎴愬姛鍔犺浇 ${data.璁＄畻缁撴灉.length} 鍦烘瘮璧涙暟鎹甡, 'success');
                
                // 鏄剧ず缁撴灉
                displayResults();
                
                // 鐢熸垚涓嬭浇閾炬帴
                generateDownloadLink();
                
                return webData;
            } catch (error) {
                console.error('鍔犺浇Web鏁版嵁閿欒:', error);
                updateProgress(0);
                showStatus(`鍔犺浇澶辫触: ${error.message}`, 'error');
                
                // 濡傛灉鏂囦欢涓嶅瓨鍦紝鎻愮ず鐢ㄦ埛
                if (error.message.includes('鏂囦欢涓嶅瓨鍦?)) {
                    showStatus(`璇峰厛杩愯 combine_probability.js 鐢熸垚 ${currentPeriod}鏈焈web.json 鏂囦欢`, 'error');
                }
                
                return null;
            }
        }
        

        

        
        // 鏄剧ず璁＄畻缁撴灉
        function displayResults() {
            if (!webData || !webData.璁＄畻缁撴灉 || webData.璁＄畻缁撴灉.length === 0) {
                resultsContainer.innerHTML = `
                    <p style="text-align: center; opacity: 0.7; padding: 40px;">
                        鏆傛棤鏁版嵁锛岃鍏堝姞杞絎eb JSON鏁版嵁
                    </p>
                `;
                return;
            }
            
            let html = `
                <div style="margin-bottom: 30px; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; border-left: 4px solid #00bcd4;">
                    <h3 style="color: #00bcd4; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-info-circle"></i> 鏁版嵁淇℃伅
                    </h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">
                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">鏈熸暟</p>
                            <p style="font-size: 1.2em; font-weight: 600;">${webData.鏈熸暟 || '鏈煡'}</p>
                        </div>

                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">鐢熸垚鏃堕棿</p>
                            <p>${webData.鐢熸垚鏃堕棿 ? new Date(webData.鐢熸垚鏃堕棿).toLocaleString() : '鏈煡'}</p>
                        </div>

                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">鏁版嵁鏉ユ簮</p>
                            <p style="word-break: break-all;">${webData.鏁版嵁鏉ユ簮 ? `${webData.鏁版嵁鏉ユ簮.鍩虹棰勬祴鏂囦欢}<br>${webData.鏁版嵁鏉ユ簮.楂樼骇棰勬祴鏂囦欢}` : 'web.json鏂囦欢'}</p>
                        </div>
                        <div>
                            <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9em;">鍔犳潈瑙勫垯</p>
                            <p>${webData.鍔犳潈瑙勫垯 || '鍩虹棰勬祴姒傜巼 + 楂樼骇棰勬祴姒傜巼'}</p>
                        </div>
                    </div>
                </div>
                
                <div style="margin-bottom: 30px;">
                    <h3 style="color: #00bcd4; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-futbol"></i> 姣旇禌棰勬祴璇︽儏 (${webData.璁＄畻缁撴灉.length} 鍦?
                    </h3>
            `;
            
            // 鏄剧ず姣忓満姣旇禌鐨勮缁嗗崱鐗?
            webData.璁＄畻缁撴灉.forEach((match, index) => {
                const winPercent = (match.鍚堝苟姒傜巼.鑳?* 100).toFixed(1);
                const drawPercent = (match.鍚堝苟姒傜巼.骞?* 100).toFixed(1);
                const losePercent = (match.鍚堝苟姒傜巼.璐?* 100).toFixed(1);
